<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema Contábil • Em Construção</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fontes e ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Lottie para animações profissionais -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at top, #131313, #101010);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eaf4ff;
            overflow: hidden;
        }

        .card {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 50px 70px;
            border-radius: 22px;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.6);
            text-align: center;
            max-width: 520px;
            animation: fadeIn 1.2s ease forwards;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-top: 20px;
            color: #ffffff;
        }

        p {
            margin-top: 12px;
            font-size: 1.05rem;
            opacity: 0.85;
        }

        .status {
            margin-top: 25px;
            font-size: 0.95rem;
            letter-spacing: 3px;
            color: #00ffa6;
            animation: blink 1.4s infinite;
        }

        /* Barra de progresso elegante */
        .progress {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            margin-top: 30px;
            overflow: hidden;
        }

        .progress span {
            display: block;
            height: 100%;
            width: 35%;
            background: linear-gradient(90deg, #00d4ff, #00ffa6);
            animation: loading 3s infinite ease-in-out;
        }

        /* Rodapé */
        .footer {
            position: fixed;
            bottom: 18px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            opacity: 0.5;
        }

        /* Animações */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes loading {
            0% { width: 15%; }
            50% { width: 75%; }
            100% { width: 15%; }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- Engenheiro realista animado (Lottie) -->
        <lottie-player 
            src="https://assets10.lottiefiles.com/packages/lf20_jcikwtux.json"
            background="transparent"
            speed="1"
            style="width: 280px; height: 280px; margin: 0 auto;"
            loop
            autoplay>
        </lottie-player>

        <h1>SISTEMA EM CONSTRUÇÃO</h1>
        <p>Estamos finalizando os acoplamentos,e importações.</p>

        <div class="status">EM BREVE LIBERADO</div>

        <div class="progress">
            <span></span>
        </div>

    </div>

    <div class="footer">
        © 2026 • Plataforma SIS-C (2) • Todos os direitos reservados.
    </div>

</body>
</html>
